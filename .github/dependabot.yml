version: 2

updates:
  - package-ecosystem: docker
    directory: /
    target-branch: next
    schedule:
      interval: daily
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    target-branch: next
    schedule:
      interval: daily
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /
    target-branch: next
    schedule:
      interval: daily
    cooldown:
      default-days: 7

  - package-ecosystem: uv
    directory: /
    target-branch: next
    schedule:
      interval: daily
    cooldown:
      default-days: 7
